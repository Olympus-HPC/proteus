# DESCRIPTION:
###############################################################################
# General GitLab pipelines configurations for supercomputers and Linux clusters
# at Lawrence Livermore National Laboratory (LLNL).
# This entire pipeline is LLNL-specific
#
# Important note: This file is a template provided by llnl/radiuss-shared-ci.
# Remains to set variable values, change the reference to the radiuss-shared-ci
# repo, opt-in and out optional features. The project can then extend it with
# additional stages.
#
# In addition, each project should copy over and complete:
# - .gitlab/custom-jobs-and-variables.yml
# - .gitlab/subscribed-pipelines.yml
#
# The jobs should be specified in a file local to the project,
# - .gitlab/jobs/${CI_MACHINE}.yml
# or generated (see LLNL/Umpire for an example).
###############################################################################

# We define the following GitLab pipeline variables:
variables:
##### LC GITLAB CONFIGURATION
# Use an LLNL service user to run CI. This prevents from running pipelines as
# an actual user.
  LLNL_SERVICE_USER: "proteusdev"
# Use the service user workspace. Solves permission issues, stores everything
# at the same location whoever triggers a pipeline.
  CUSTOM_CI_BUILDS_DIR: "/usr/workspace/proteusdev/gitlab-runner"
# Tells Gitlab to recursively update the submodules when cloning the project.
#  GIT_SUBMODULE_STRATEGY: recursive

##### PROJECT VARIABLES
# We build the projects in the CI clone directory.
# Used in script/gitlab/build_and_test.sh script.
# TODO: add a clean-up mechanism.
  BUILD_ROOT: ${CI_PROJECT_DIR}

##### SHARED_CI CONFIGURATION
# Required information about GitHub repository
  GITHUB_PROJECT_NAME: "proteus"
  GITHUB_PROJECT_ORG: "Olympus-HPC"
# Override the pattern describing branches that will skip the "draft PR filter
# test".  Add protected branches here. See default value in
# preliminary-ignore-draft-pr.yml.
#  ALWAYS_RUN_PATTERN: ""

# We organize the build-and-test stage with sub-pipelines. Each sub-pipeline
# corresponds to a test batch on a given machine.

# Create a minimal pipeline for meta-only changes so GitHub still receives a
# passing GitLab status. The per-stage path groups live in
# .gitlab/subscribed-pipelines.yml because YAML anchors do not carry across
# included files.
workflow:
  rules:
    # Don't compare main to itself; default-branch pipelines should always run.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - changes:
        compare_to: &compare_to_ref "refs/heads/main"
        paths: &pipeline_trigger_paths
          - ".gitlab-ci.yml"
          - ".gitlab/**/*"
          - "CMakeLists.txt"
          - "cmake/**/*"
          - "include/**/*"
          - "src/**/*"
          - "scripts/gitlab/**/*"
          - "tests/**/*"
          - "packaging/spack/**/*"
      when: always
    - changes:
        compare_to: *compare_to_ref
        paths: &meta_only_paths
          - ".github/**/*"
          - "docs/**/*"
          - "*.md"
          - "mkdocs.yml"
          - ".pre-commit-config.yaml"
          - "COPYRIGHT"
          - "LICENSE"
          - "NOTICE"
      when: always
    - when: always

# High level stages
stages:
  - prerequisites
  - build-and-test
  - test-integration
  - test-spack
  - run-benchmarks

meta-only:
  stage: prerequisites
  interruptible: true
  tags: [shell, oslic]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: never
    - changes:
        compare_to: *compare_to_ref
        paths: *meta_only_paths
  script:
    - echo "Meta-only change detected; skipping heavy GitLab CI."

# Template for jobs triggering a build-and-test sub-pipeline:
.build-and-test-llvm:
  stage: build-and-test
  interruptible: true
  parallel:
    matrix:
      - PROTEUS_CI_LLVM_VERSION: "19.1.7"
      - PROTEUS_CI_LLVM_VERSION: "20.1.8"
        PROTEUS_CODECOV_VERSION_SELECTED: "1"
      - PROTEUS_CI_LLVM_VERSION: "22.1.0"
  trigger:
    include:
      - local: '.gitlab/custom-jobs-and-variables.yml'
      - project: 'radiuss/radiuss-shared-ci'
        ref: 'v2025.09.1'
        file: 'pipelines/${CI_MACHINE}.yml'
      # Add your jobs
      # you can use a local file
      - local: '.gitlab/jobs/${CI_MACHINE}.yml'
      # or a file generated in the previous steps
      # - artifact: '${CI_MACHINE}-jobs.yml'
      #   job: 'generate-job-file'
      # (See Umpire CI setup for an example).
    strategy: depend
    forward:
      pipeline_variables: true

.build-and-test-rocm:
  stage: build-and-test
  interruptible: true
  parallel:
    matrix:
      - PROTEUS_CI_ROCM_VERSION: "6.4.3"
      - PROTEUS_CI_ROCM_VERSION: "7.1.1"
      - PROTEUS_CI_ROCM_VERSION: "7.2.0"
        PROTEUS_CODECOV_VERSION_SELECTED: "1"
  trigger:
    include:
      - local: '.gitlab/custom-jobs-and-variables.yml'
      - project: 'radiuss/radiuss-shared-ci'
        ref: 'v2025.09.1'
        file: 'pipelines/${CI_MACHINE}.yml'
      # Add your jobs
      # you can use a local file
      - local: '.gitlab/jobs/${CI_MACHINE}.yml'
      # or a file generated in the previous steps
      # - artifact: '${CI_MACHINE}-jobs.yml'
      #   job: 'generate-job-file'
      # (See Umpire CI setup for an example).
    strategy: depend
    forward:
      pipeline_variables: true

.test-integration:
  stage: test-integration
  interruptible: true
  trigger:
    include:
      - local: '.gitlab/custom-jobs-and-variables.yml'
      - project: 'radiuss/radiuss-shared-ci'
        ref: 'v2025.09.1'
        file: 'pipelines/${CI_MACHINE}.yml'
      - local: '.gitlab/jobs/${CI_MACHINE}-integration.yml'
    strategy: depend
    forward:
      pipeline_variables: true

.test-spack:
  stage: test-spack
  interruptible: true
  trigger:
    include:
      - local: '.gitlab/custom-jobs-and-variables.yml'
      - project: 'radiuss/radiuss-shared-ci'
        ref: 'v2025.09.1'
        file: 'pipelines/${CI_MACHINE}.yml'
      - local: '.gitlab/jobs/${CI_MACHINE}-spack.yml'
    strategy: depend
    forward:
      pipeline_variables: true

.run-benchmarks:
  stage: run-benchmarks
  interruptible: true
  trigger:
    include:
      - local: '.gitlab/custom-jobs-and-variables.yml'
      - project: 'radiuss/radiuss-shared-ci'
        ref: 'v2025.09.1'
        file: 'pipelines/${CI_MACHINE}.yml'
      # Add your jobs
      # you can use a local file
      - local: '.gitlab/jobs/${CI_MACHINE}-benchmarks.yml'
    strategy: depend
    forward:
      pipeline_variables: true

include:
  # Sets ID tokens for every job using `default:`
  - project: 'lc-templates/id_tokens'
    file: 'id_tokens.yml'
  # [Optional] checks preliminary to running the actual CI test
  - project: 'radiuss/radiuss-shared-ci'
    ref: 'v2025.09.1'
    file: 'utilities/preliminary-ignore-draft-pr.yml'
  - project: 'radiuss/radiuss-shared-ci'
    ref: 'v2025.09.1'
    file: 'utilities/skip-branch-not-a-pr.yml'
  # pipelines subscribed by the project
  - local: '.gitlab/subscribed-pipelines.yml'
