.base-job:
  extends: .job_on_tioga
  before_script:
    - echo "=== Start CI spack Tests ==="
  after_script:
    - !reference [.cancel-flux-allocation, after_script]
    - !reference [.remove-builds-dir, after_script]
    - echo "=== End CI spack Tests ==="

.variants:
  parallel:
    matrix:
      - PROTEUS_CI_ROCM_VERSION: ["6.3.1", "6.4.3", "7.1.0"]

test-spack-tioga:
  extends: [.base-job, .variants]
  variables:
    PROTEUS_CI_AMDGPU_TARGET: "gfx90a"
