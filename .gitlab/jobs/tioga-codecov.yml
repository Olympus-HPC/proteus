.base-job:
  extends: .job_on_tioga
  interruptible: true
  before_script:
    - echo "=== Start CI Codecov Tests ==="
  after_script:
    - !reference [.clean-flux-allocation, after_script]
    - echo "=== End CI Codecov Tests ==="

.variants:
  parallel:
    matrix:
      - PROTEUS_CI_ROCM_VERSION: ["7.2.0"]

test-codecov-tioga:
  extends: [.base-job, .variants]
  artifacts:
    when: always
    paths:
      - gitlab-codecov-artifacts/tioga/coverage.xml
      - gitlab-codecov-artifacts/tioga/codecov-upload.log
