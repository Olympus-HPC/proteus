.base-job:
  extends: .job_on_matrix
  interruptible: true
  before_script:
    - echo "=== Start CI spack Tests ==="
  after_script:
    - !reference [.clean-slurm-allocation, after_script]
    - !reference [.remove-builds-dir, after_script]
    - echo "=== End CI spack Tests ==="

.variants:
  parallel:
    matrix:
      - PROTEUS_CI_CUDA_VERSION: ["12.9"]
        PROTEUS_CI_LLVM_VERSION: ["19.1.3"]

test-spack-matrix:
  extends: [.base-job, .variants]
  variables:
    PROTEUS_CI_CUDA_ARCH: "90"
