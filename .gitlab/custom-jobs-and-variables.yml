# We define the following GitLab pipeline variables:
variables:
# In some pipelines we create only one allocation shared among jobs in
# order to save time and resources. This allocation has to be uniquely
# named so that we are sure to retrieve it and avoid collisions.
  ALLOC_NAME: ${CI_PROJECT_NAME}_ci_${CI_PIPELINE_ID}

# Matrix
# Time in minutes.
# Arguments for top level allocation
# Note: can be set to "OFF" to prevent allocation sharing.
  MATRIX_SHARED_ALLOC: "--gpus=1 --nodes=1 --time=60 --partition=pdebug"
# Arguments for job level allocation
  MATRIX_JOB_ALLOC: "--gpus=1 --nodes=1 --time=60 --partition=pdebug"
# Arguments for performance job allocation (dedicated allocation with no overlapping).
  MATRIX_PERF_ALLOC: "--exclusive --time=60 --nodes=1"
# Add variables that should apply to all the jobs on a machine:
#  MATRIX_MY_VAR: "..."

# Tioga
# Arguments for top level allocation
# Note: can be set to "OFF" to prevent allocation sharing.
# OPTIONAL: "-o per-resource.count=2" allows to get 2 jobs running on each node.
  TIOGA_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=1h --nodes=1 -o per-resource.count=4"
# Arguments for job level allocation
  TIOGA_JOB_ALLOC: "--queue=pci --time-limit=1h --nodes=1 --begin-time=+5s"
# Arguments for performance job allocation (dedicated allocation with no overlapping).
  TIOGA_PERF_ALLOC: "--queue=pci --exclusive --time-limit=1h --nodes=1 --begin-time=+5s"
# Add variables that should apply to all the jobs on a machine:
#  TIOGA_MY_VAR: "..."

# Tuolumne
# Arguments for top level allocation
# Note: can be set to "OFF" to prevent allocation sharing.
# OPTIONAL: "-o per-resource.count=2" allows to get 2 jobs running on each node.
  TUOLUMNE_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=1h --nodes=1 -o per-resource.count=4"
# Arguments for job level allocation
  TUOLUMNE_JOB_ALLOC: "--queue=pci --time-limit=1h --nodes=1 --begin-time=+5s"
# Arguments for performance job allocation (dedicated allocation with no overlapping).
  TUOLUMNE_PERF_ALLOC: "--queue=pci --exclusive --time-limit=1h --nodes=1 --begin-time=+5s"
# Add variables that should apply to all the jobs on a machine:
#  TUOLUMNE_MY_VAR: "..."

# Configuration shared by build and test jobs specific to this project.
# Not all configuration can be shared. Here projects can fine tune the
# CI behavior.
# See Umpire for an example (export junit test reports).
.custom_job:
  variables:
    JOB_TEMPLATE_CANNOT_BE_EMPTY: "True"

.remove-builds-dir:
  after_script:
    - rm -rf ${CI_BUILDS_DIR}

.cancel-slurm-allocation:
  after_script:
    - |
      if [ "${CI_JOB_STATUS}" = "canceled" ]; then
        echo "### Cancel SLURM allocation job=${CI_JOB_NAME} status=${CI_JOB_STATUS}"
        ALLOC_JOBID="$(squeue -h --states=PD,R,CF --name="${ALLOC_NAME}" --format=%A)"

        if [ -n "${ALLOC_JOBID}" ]; then
          echo "### Attempting to cancel shared allocation ${ALLOC_NAME} (${ALLOC_JOBID})"
          scancel "${ALLOC_JOBID}" || true
        else
          echo "### No allocation found for ${ALLOC_NAME}"
        fi
      fi

.cancel-flux-allocation:
  after_script:
    - |
      if [ "${CI_JOB_STATUS}" = "canceled" ]; then
        echo "### Cancel Flux allocation job=${CI_JOB_NAME} status=${CI_JOB_STATUS}"
        URI="$(flux jobs --name="${ALLOC_NAME}" -n -o "{id}")"

        if [ -n "${URI}" ]; then
          echo "### Attempting to cancel shared allocation ${ALLOC_NAME} (${URI})"
          flux cancel "${URI}" || true
        else
          echo "### No allocation found for ${ALLOC_NAME}"
        fi
      fi
