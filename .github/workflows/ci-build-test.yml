name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  prepare-conda:
    name: prepare conda ${{ matrix.os }} LLVM ${{ matrix.llvm }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        llvm: [19.1.7, 20.1.8, 22.1.0]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          conda-remove-defaults: true
      # Build the toolchain env once per LLVM version, then hand it to build jobs.
      - name: Create environment
        run: |
          conda create -y -n llvm-env -c conda-forge \
            conda-pack \
            clang=${{ matrix.llvm }} \
            clangxx=${{ matrix.llvm }} \
            clangdev=${{ matrix.llvm }} \
            llvmdev=${{ matrix.llvm }} \
            lit=${{ matrix.llvm }} \
            mlir=${{ matrix.llvm }} \
            zlib zstd
      - name: Pack environment
        run: |
          mkdir -p "$RUNNER_TEMP/conda-artifacts"
          conda run -n llvm-env conda-pack -n llvm-env \
            -o "$RUNNER_TEMP/conda-artifacts/llvm-env-${{ matrix.llvm }}.tar.gz"
      - name: Upload environment
        uses: actions/upload-artifact@v7
        with:
          name: llvm-conda-${{ matrix.llvm }}
          path: ${{ runner.temp }}/conda-artifacts/llvm-env-${{ matrix.llvm }}.tar.gz
          compression-level: 0
          retention-days: 1

  build-and-test:
    name: proteus ${{ matrix.os }} LLVM ${{ matrix.llvm }} shared ${{ matrix.build_shared }} MLIR ${{ matrix.mlir }}
    runs-on: ${{ matrix.os }}
    needs: prepare-conda
    strategy:
      matrix:
        os: [ubuntu-latest]
        llvm: [19.1.7, 20.1.8, 22.1.0]
        build_shared: [on, off]
        mlir: [on, off]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Download environment
        uses: actions/download-artifact@v8
        with:
          name: llvm-conda-${{ matrix.llvm }}
          path: ${{ runner.temp }}/conda-artifacts
      - name: Unpack environment
        run: |
          env_dir="$RUNNER_TEMP/llvm-env-${{ matrix.llvm }}"
          mkdir -p "$env_dir"
          tar -xzf "$RUNNER_TEMP/conda-artifacts/llvm-env-${{ matrix.llvm }}.tar.gz" -C "$env_dir"
          "$env_dir/bin/conda-unpack"
          echo "CONDA_PREFIX=$env_dir" >> "$GITHUB_ENV"
          echo "$env_dir/bin" >> "$GITHUB_PATH"
      - name: Build build_shared=${{ matrix.build_shared }}
        run: |
          mkdir -p build
          pushd build
          set -o pipefail
          cmake .. \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX;$CONDA_PREFIX/lib/cmake" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_DEVELOPER_COMPILER_FLAGS=on \
            -DENABLE_TESTS=on \
            -DLLVM_INSTALL_DIR=$(llvm-config --prefix) \
            -DPROTEUS_ENABLE_MLIR=${{ matrix.mlir }} \
            -DBUILD_SHARED=${{ matrix.build_shared }} |& tee cmake_output.log
          if grep -q "Manually-specified variables were not used by the project:" cmake_output.log; then
            echo "Error: Unused variables detected"
            exit 1
          fi
          make -j
          popd
      - name: Test
        run: |
          pushd build
          ctest -j8 -T test --output-on-failure
          popd

  coverage:
    name: coverage ubuntu LLVM 20.1.8
    runs-on: ubuntu-latest
    needs: prepare-conda
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Download environment
        uses: actions/download-artifact@v8
        with:
          name: llvm-conda-20.1.8
          path: ${{ runner.temp }}/conda-artifacts
      - name: Unpack environment
        run: |
          env_dir="$RUNNER_TEMP/llvm-env-20.1.8"
          mkdir -p "$env_dir"
          tar -xzf "$RUNNER_TEMP/conda-artifacts/llvm-env-20.1.8.tar.gz" -C "$env_dir"
          "$env_dir/bin/conda-unpack"
          echo "CONDA_PREFIX=$env_dir" >> "$GITHUB_ENV"
          echo "$env_dir/bin" >> "$GITHUB_PATH"
      - name: Install coverage tools
        run: |
          conda install -y -p "$CONDA_PREFIX" -c conda-forge gcovr
      - name: Build with coverage
        run: |
          mkdir -p build
          pushd build
          set -o pipefail
          cmake .. \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX;$CONDA_PREFIX/lib/cmake" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_DEVELOPER_COMPILER_FLAGS=on \
            -DENABLE_TESTS=on \
            -DENABLE_COVERAGE=on \
            -DLLVM_INSTALL_DIR=$(llvm-config --prefix) \
            -DPROTEUS_ENABLE_MLIR=on \
            -DBUILD_SHARED=off |& tee cmake_output.log
          if grep -q "Manually-specified variables were not used by the project:" cmake_output.log; then
            echo "Error: Unused variables detected"
            exit 1
          fi
          make -j
          popd
      - name: Run tests
        run: |
          pushd build
          ctest -j8 -T test --output-on-failure
          popd
      - name: Generate coverage report
        run: |
          gcovr \
            --root "$GITHUB_WORKSPACE" \
            --filter "$GITHUB_WORKSPACE/src" \
            --filter "$GITHUB_WORKSPACE/include" \
            --exclude-directories "$GITHUB_WORKSPACE/tests" \
            --gcov-executable "llvm-cov gcov" \
            --xml-pretty \
            --output coverage.xml \
            --print-summary \
            build
      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: host
          name: ubuntu-llvm-20-host
          use_oidc: true

  build-and-test-macos:
    name: proteus macos LLVM ${{ matrix.llvm }} shared ${{ matrix.build_shared }} MLIR ${{ matrix.mlir }}
    runs-on: macos-latest
    strategy:
      matrix:
        llvm: [19, 20, 22]
        build_shared: [on, off]
        mlir: [on, off]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          brew install llvm@${{ matrix.llvm }}
      - name: Install lit
        run: |
          brew install lit
      - name: Configure LLVM environment
        run: |
          LLVM_PREFIX="$(brew --prefix llvm@${{ matrix.llvm }})"
          echo "LLVM_PREFIX=$LLVM_PREFIX" >> "$GITHUB_ENV"
          echo "CC=$LLVM_PREFIX/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=$LLVM_PREFIX/bin/clang++" >> "$GITHUB_ENV"
          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
      - name: Build build_shared=${{ matrix.build_shared }}
        run: |
          mkdir -p build
          pushd build
          set -o pipefail
          cmake .. \
            -DCMAKE_PREFIX_PATH="$LLVM_PREFIX" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk macosx --show-sdk-path)" \
            -DENABLE_DEVELOPER_COMPILER_FLAGS=on \
            -DENABLE_TESTS=on \
            -DLLVM_INSTALL_DIR="$LLVM_PREFIX" \
            -DPROTEUS_ENABLE_MLIR=${{ matrix.mlir }} \
            -DBUILD_SHARED=${{ matrix.build_shared }} 2>&1 | tee cmake_output.log
          if grep -q "Manually-specified variables were not used by the project:" cmake_output.log; then
            echo "Error: Unused variables detected"
            exit 1
          fi
          make -j
          popd
      - name: Test
        run: |
          pushd build
          ctest -j8 -T test --output-on-failure
          popd
