name: cpp-linter

on:
  pull_request:

jobs:
  cpp-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM 19
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-19 \
            llvm-19-dev \
            libclang-19-dev \
            libmlir-19-dev \
            zlib1g-dev \
            libzstd-dev
      - name: Run cmake to export compilation database
        run: |
          mkdir -p build
          pushd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-19;/usr/lib/llvm-19/lib/cmake" \
            -DLLVM_INSTALL_DIR=$(llvm-config-19 --prefix) \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DPROTEUS_ENABLE_MLIR=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=on
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: 19
          ignore: .github | scripts
          database: build
          extra-args: '-DPROTEUS_ENABLE_HIP -DPROTEUS_ENABLE_MLIR'
          style: file
          tidy-checks: ''
          lines-changed-only: true
          format-review: false
          tidy-review: false
          thread-comments: false
          passive-reviews: true
          step-summary: true
      - name: Check clang-format linter status
        if: steps.linter.outputs.clang-format-checks-failed != 0
        run: exit 1
