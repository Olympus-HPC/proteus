name: cpp-linter

on:
  pull_request:

jobs:
  cpp-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          conda-remove-defaults: true
      # Install Clang/LLVM using conda
      - name: Create environment
        run: |
          conda install -y -q -c conda-forge \
            clang=19.1.7 \
            clangxx=19.1.7 \
            clangdev=19.1.7 \
            llvmdev=19.1.7 \
            lit=19.1.7 \
            mlir=19.1.7 \
            zlib zstd
      - name: Run cmake to export compilation database
        run: |
          mkdir -p build
          pushd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX;$CONDA_PREFIX/lib/cmake" \
            -DLLVM_INSTALL_DIR=$(llvm-config --prefix) \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=on
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: 19
          ignore: .github | scripts
          database: build
          extra-args: '-DPROTEUS_ENABLE_HIP -DPROTEUS_ENABLE_MLIR'
          style: file
          tidy-checks: ''
          lines-changed-only: true
          format-review: false
          tidy-review: false
          thread-comments: false
          passive-reviews: true
          step-summary: true
      - name: Check clang-format linter status
        if: steps.linter.outputs.clang-format-checks-failed != 0
        run: exit 1
