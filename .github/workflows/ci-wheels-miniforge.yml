name: Wheels Miniforge

on:
  pull_request:
    paths:
      - ".github/workflows/ci-wheels.yml"
      - ".github/workflows/ci-wheels-miniforge.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/wheels/**"
      - "python/**"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-wheels.yml"
      - ".github/workflows/ci-wheels-miniforge.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/wheels/**"
      - "python/**"
      - "src/**"

jobs:
  build-wheels:
    name: wheels-miniforge ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: arm64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: bash packaging/wheels/setup-miniforge-manylinux.sh
          CIBW_BEFORE_ALL_MACOS: brew install llvm@22
          CIBW_BEFORE_BUILD_MACOS: python -m pip install delocate
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: >-
            CONDA_PREFIX=/opt/miniforge/envs/proteus-llvm22
            LLVM_INSTALL_DIR=/opt/miniforge/envs/proteus-llvm22
            CMAKE_PREFIX_PATH=/opt/miniforge/envs/proteus-llvm22
            LLVM_DIR=/opt/miniforge/envs/proteus-llvm22/lib/cmake/llvm
            MLIR_DIR=/opt/miniforge/envs/proteus-llvm22/lib/cmake/mlir
            Clang_DIR=/opt/miniforge/envs/proteus-llvm22/lib/cmake/clang
            CC=/opt/miniforge/envs/proteus-llvm22/bin/clang
            CXX=/opt/miniforge/envs/proteus-llvm22/bin/clang++
            PATH=/opt/miniforge/envs/proteus-llvm22/bin:$PATH
            LD_LIBRARY_PATH=/opt/miniforge/envs/proteus-llvm22/lib:$LD_LIBRARY_PATH
          CIBW_ENVIRONMENT_MACOS: >-
            LLVM_INSTALL_DIR=/opt/homebrew/opt/llvm
            CC=/opt/homebrew/opt/llvm/bin/clang
            CXX=/opt/homebrew/opt/llvm/bin/clang++
            PATH=/opt/homebrew/opt/llvm/bin:$PATH
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            bash packaging/wheels/auditwheel-repair-manylinux.sh {wheel} {dest_dir}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir}
            -v {wheel}

      - name: Upload wheels
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-miniforge-${{ runner.os }}
          path: |
            wheelhouse/*.whl
            wheelhouse/*.auditwheel.txt
