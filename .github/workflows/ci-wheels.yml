name: Wheels

permissions:
  contents: read
  packages: read

on:
  pull_request:
    paths:
      - ".github/workflows/ci-wheels.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/wheels/**"
      - "python/**"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-wheels.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/wheels/**"
      - "python/**"
      - "src/**"

jobs:
  build-wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-14 ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Log in to GHCR
        if: runner.os == 'Linux'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: arm64
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/olympus-hpc/proteus-manylinux-llvm@sha256:7c8ffeff5225b096175e0b7d79fced4bd1ac22727289d5cad84374cfab6dc3a3 # proteus-manylinux-llvm:22.1.3
          CIBW_BEFORE_ALL_MACOS: brew install llvm@22
          CIBW_BEFORE_BUILD_MACOS: python -m pip install delocate
          CIBW_BUILD_VERBOSITY: 1
          # The prebuilt manylinux image's static LLVM/Clang archives are
          # built with the container's native GCC toolchain, so keep the Linux
          # Proteus build on that host compiler and use LLVM_INSTALL_DIR only
          # for package discovery and tool lookup.
          CIBW_ENVIRONMENT_LINUX: >-
            LLVM_INSTALL_DIR=/opt/llvm-22.1.3 PATH=/opt/llvm-22.1.3/bin:$PATH
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
            LLVM_INSTALL_DIR=/opt/homebrew/opt/llvm
            CC=/opt/homebrew/opt/llvm/bin/clang
            CXX=/opt/homebrew/opt/llvm/bin/clang++
            PATH=/opt/homebrew/opt/llvm/bin:$PATH
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v
            {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-${{ runner.os }}
          path: wheelhouse/*.whl
