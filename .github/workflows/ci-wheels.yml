name: Wheels

permissions:
  contents: read
  packages: read

on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ci-wheels.yml"
      - "CMakeLists.txt"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/python/**"
      - "pyproject.toml"
      - "python/**"
      - "setup.py"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-wheels.yml"
      - "CMakeLists.txt"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/python/**"
      - "pyproject.toml"
      - "python/**"
      - "setup.py"
      - "src/**"

env:
  PROTEUS_LLVM_VERSION: "22.1.3"
  PROTEUS_MANYLINUX_LLVM_IMAGE_REPO: "ghcr.io/olympus-hpc/proteus-manylinux-llvm"
  PROTEUS_CUDA_VERSION: "12.4.1"
  PROTEUS_CUDA_MAJOR_MINOR: "12-4"
  PROTEUS_ROCM_VERSION: "7.2.1"
  PROTEUS_ROCM_EL_VERSION: "8"
  PROTEUS_HOST_BACKEND_PACKAGE: "proteus-python-backend-host-llvm22"
  PROTEUS_CUDA_BACKEND_PACKAGE: "proteus-python-backend-cuda12-llvm22"
  PROTEUS_ROCM_BACKEND_PACKAGE: "proteus-python-backend-rocm72"

jobs:
  build-shim-wheel:
    name: shim wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build shim wheel
        run: |
          python -m pip install -U pip build setuptools setuptools-scm
          python -m build --wheel --outdir dist .

      - name: Upload shim wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-shim
          path: dist/*.whl

      - name: Verify shim-only install
        shell: bash
        run: |
          python -m venv /tmp/proteus-shim-test
          /tmp/proteus-shim-test/bin/python -m pip install -U pip
          /tmp/proteus-shim-test/bin/python -m pip install dist/proteus_python-*.whl
          /tmp/proteus-shim-test/bin/python - <<'PY'
          import proteus

          assert proteus.available_backends() == []
          assert proteus.available_backend_variants() == []
          try:
              _ = proteus.active_backend
          except ImportError as exc:
              assert "No Proteus backend is installed" in str(exc), str(exc)
          else:
              raise AssertionError("expected shim-only install to require an explicit backend")
          PY

  build-shim-sdist:
    name: shim sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build shim sdist
        run: |
          python -m pip install -U pip build setuptools setuptools-scm
          python -m build --sdist --outdir dist .

      - name: Upload shim sdist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sdist-shim
          path: dist/*.tar.gz

  build-host-backend-wheels:
    name: host backend ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: wheels-host-linux
          - os: macos-14
            artifact_name: wheels-host-macos
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Log in to GHCR
        if: runner.os == 'Linux'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build host backend wheels
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: arm64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* cp31?t-*"
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ format('{0}:{1}', env.PROTEUS_MANYLINUX_LLVM_IMAGE_REPO, env.PROTEUS_LLVM_VERSION) }}
          CIBW_BEFORE_ALL_MACOS: brew install llvm@22
          CIBW_BEFORE_BUILD_MACOS: python -m pip install delocate
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: >-
            LLVM_INSTALL_DIR=/opt/llvm-${{ env.PROTEUS_LLVM_VERSION }} PATH=/opt/llvm-${{ env.PROTEUS_LLVM_VERSION }}/bin:$PATH
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
            LLVM_INSTALL_DIR=/opt/homebrew/opt/llvm
            CC=/opt/homebrew/opt/llvm/bin/clang
            CXX=/opt/homebrew/opt/llvm/bin/clang++
            PATH=/opt/homebrew/opt/llvm/bin:$PATH
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v
            {wheel}
        run: |
          python -m pip install -U pip build cibuildwheel delocate setuptools setuptools-scm
          python -m cibuildwheel packaging/python/backend-host --output-dir wheelhouse

      - name: Verify default host install
        shell: bash
        env:
          PROTEUS_LLVM_VERSION: ${{ env.PROTEUS_LLVM_VERSION }}
        run: |
          LLVM_MAJOR="${PROTEUS_LLVM_VERSION%%.*}"
          EXPECTED_HOST_VARIANT="host_llvm${LLVM_MAJOR}"
          export EXPECTED_HOST_VARIANT
          python -m pip install -U pip build setuptools setuptools-scm
          python -m build --wheel --outdir dist .
          python -m venv /tmp/proteus-wheel-test
          /tmp/proteus-wheel-test/bin/python -m pip install -U pip
          /tmp/proteus-wheel-test/bin/python -m pip install \
            --no-index \
            --find-links dist \
            --find-links wheelhouse \
            dist/proteus_python-*.whl \
            ${{ env.PROTEUS_HOST_BACKEND_PACKAGE }}
          /tmp/proteus-wheel-test/bin/python - <<'PY'
          import os
          import proteus
          expected_variant = os.environ["EXPECTED_HOST_VARIANT"]
          assert proteus.active_backend == "host"
          assert proteus.active_backend_variant == expected_variant
          assert proteus.available_backend_variants() == [expected_variant]
          PY
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_loader.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_host_cpp_smoke.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_host_cpp_validation.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_invalid_clang_override.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_wheel_layout.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_selection.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_wildcard_import.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_loader_zero_backends.py

      - name: Upload host backend wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  build-cuda-backend-wheels:
    name: cuda backend linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build local CUDA manylinux image
        env:
          BASE_IMAGE: ${{ format('{0}:{1}', env.PROTEUS_MANYLINUX_LLVM_IMAGE_REPO, env.PROTEUS_LLVM_VERSION) }}
          CUDA_VERSION: ${{ env.PROTEUS_CUDA_VERSION }}
          CUDA_MAJOR_MINOR: ${{ env.PROTEUS_CUDA_MAJOR_MINOR }}
          IMAGE_REPO: proteus-manylinux-cuda-local
          IMAGE_TAG: ${{ github.run_id }}-${{ github.run_attempt }}
          PUSH: "0"
        run: |
          bash packaging/python/image-scripts/build-manylinux-cuda-container.sh

      - name: Build CUDA backend wheels
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* cp31?t-*"
          CIBW_MANYLINUX_X86_64_IMAGE: proteus-manylinux-cuda-local:${{ github.run_id }}-${{ github.run_attempt }}
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: >-
            LLVM_INSTALL_DIR=/opt/llvm-${{ env.PROTEUS_LLVM_VERSION }}
            CUDA_HOME=/usr/local/cuda
            PATH=/opt/llvm-${{ env.PROTEUS_LLVM_VERSION }}/bin:/usr/local/cuda/bin:$PATH
        run: |
          python -m pip install -U pip auditwheel build cibuildwheel setuptools setuptools-scm
          python -m cibuildwheel packaging/python/backend-cuda --output-dir wheelhouse

      - name: Verify host functionality through CUDA backend
        shell: bash
        env:
          PROTEUS_CUDA_VERSION: ${{ env.PROTEUS_CUDA_VERSION }}
          PROTEUS_LLVM_VERSION: ${{ env.PROTEUS_LLVM_VERSION }}
        run: |
          LLVM_MAJOR="${PROTEUS_LLVM_VERSION%%.*}"
          CUDA_MAJOR="${PROTEUS_CUDA_VERSION%%.*}"
          EXPECTED_CUDA_VARIANT="cuda${CUDA_MAJOR}_llvm${LLVM_MAJOR}"
          export EXPECTED_CUDA_VARIANT
          python -m pip install -U pip build setuptools setuptools-scm
          python -m build --wheel --outdir dist .
          python - <<'PY'
          import pathlib
          import re
          wheel = next(pathlib.Path("dist").glob("proteus_python-*.whl"))
          match = re.match(r"proteus_python-([^-]+)-", wheel.name)
          if not match:
              raise SystemExit(f"failed to parse version from {wheel}")
          pathlib.Path("dist/.proteus-version").write_text(match.group(1), encoding="utf-8")
          PY
          PROTEUS_VERSION="$(cat dist/.proteus-version)"
          python -m venv /tmp/proteus-wheel-test
          /tmp/proteus-wheel-test/bin/python -m pip install -U pip
          /tmp/proteus-wheel-test/bin/python -m pip install \
            --no-index \
            --find-links dist \
            --find-links wheelhouse \
            dist/proteus_python-*.whl \
            "${{ env.PROTEUS_CUDA_BACKEND_PACKAGE }}==${PROTEUS_VERSION}"
          /tmp/proteus-wheel-test/bin/python - <<'PY'
          import os
          import proteus
          expected_variant = os.environ["EXPECTED_CUDA_VARIANT"]
          assert proteus.active_backend == "cuda"
          assert proteus.active_backend_variant == expected_variant
          assert proteus.available_backend_variants() == [expected_variant]
          PY
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_loader.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_host_cpp_smoke.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_host_cpp_validation.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_invalid_clang_override.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_wheel_layout.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_selection.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_wildcard_import.py
          auditwheel show "$(find wheelhouse -name '*cp312*.whl' | head -n 1)"

      - name: Upload CUDA backend wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-cuda-linux
          path: wheelhouse/*.whl

  build-rocm-backend-wheels:
    name: rocm backend linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build local ROCm manylinux image
        env:
          ROCM_VERSION: ${{ env.PROTEUS_ROCM_VERSION }}
          ROCM_EL_VERSION: ${{ env.PROTEUS_ROCM_EL_VERSION }}
          IMAGE_REPO: proteus-manylinux-rocm-local
          IMAGE_TAG: ${{ github.run_id }}-${{ github.run_attempt }}
          PUSH: "0"
        run: |
          bash packaging/python/image-scripts/build-manylinux-rocm-container.sh

      - name: Build ROCm backend wheels
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* cp31?t-*"
          CIBW_MANYLINUX_X86_64_IMAGE: proteus-manylinux-rocm-local:${{ github.run_id }}-${{ github.run_attempt }}
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: >-
            LLVM_INSTALL_DIR=/opt/rocm-${{ env.PROTEUS_ROCM_VERSION }}/lib/llvm
            ROCM_PATH=/opt/rocm
            PATH=/opt/rocm-${{ env.PROTEUS_ROCM_VERSION }}/lib/llvm/bin:/opt/rocm/bin:$PATH
        run: |
          python -m pip install -U pip auditwheel build cibuildwheel setuptools setuptools-scm
          python -m cibuildwheel packaging/python/backend-rocm --output-dir wheelhouse

      - name: Verify host functionality through ROCm backend
        shell: bash
        env:
          PROTEUS_ROCM_VERSION: ${{ env.PROTEUS_ROCM_VERSION }}
        run: |
          ROCM_MAJOR="${PROTEUS_ROCM_VERSION%%.*}"
          ROCM_REST="${PROTEUS_ROCM_VERSION#${ROCM_MAJOR}.}"
          ROCM_MINOR="${ROCM_REST%%.*}"
          EXPECTED_ROCM_VARIANT="rocm${ROCM_MAJOR}${ROCM_MINOR}"
          export EXPECTED_ROCM_VARIANT
          python -m pip install -U pip build setuptools setuptools-scm
          python -m build --wheel --outdir dist .
          python - <<'PY'
          import pathlib
          import re
          wheel = next(pathlib.Path("dist").glob("proteus_python-*.whl"))
          match = re.match(r"proteus_python-([^-]+)-", wheel.name)
          if not match:
              raise SystemExit(f"failed to parse version from {wheel}")
          pathlib.Path("dist/.proteus-version").write_text(match.group(1), encoding="utf-8")
          PY
          PROTEUS_VERSION="$(cat dist/.proteus-version)"
          python -m venv /tmp/proteus-wheel-test
          /tmp/proteus-wheel-test/bin/python -m pip install -U pip
          /tmp/proteus-wheel-test/bin/python -m pip install \
            --no-index \
            --find-links dist \
            --find-links wheelhouse \
            dist/proteus_python-*.whl \
            "${{ env.PROTEUS_ROCM_BACKEND_PACKAGE }}==${PROTEUS_VERSION}"
          /tmp/proteus-wheel-test/bin/python - <<'PY'
          import os
          import proteus
          expected_variant = os.environ["EXPECTED_ROCM_VARIANT"]
          assert proteus.active_backend == "rocm"
          assert proteus.active_backend_variant == expected_variant
          assert proteus.available_backend_variants() == [expected_variant]
          PY
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_loader.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_host_cpp_smoke.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_host_cpp_validation.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_invalid_clang_override.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_wheel_layout.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_backend_selection.py
          /tmp/proteus-wheel-test/bin/python bindings/python/tests/test_wildcard_import.py
          for ROCM_WHEEL in wheelhouse/*.whl; do
            auditwheel show "${ROCM_WHEEL}"
          done
          python - <<'PY'
          import pathlib
          import subprocess
          import tempfile
          import zipfile

          wheels = sorted(pathlib.Path("wheelhouse").glob("*.whl"))
          if not wheels:
              raise SystemExit("no ROCm wheels found in wheelhouse")

          forbidden_runtime_libs = ("libamdhip64", "libhiprtc", "libamd_comgr")
          forbidden_needed_libs = ("libamdhip64", "libhiprtc")

          for wheel in wheels:
              with tempfile.TemporaryDirectory() as tmpdir:
                  with zipfile.ZipFile(wheel) as zf:
                      names = zf.namelist()
                      forbidden_members = [
                          name
                          for name in names
                          if any(token in pathlib.PurePosixPath(name).name
                                 for token in forbidden_runtime_libs)
                      ]
                      if forbidden_members:
                          raise SystemExit(
                              f"{wheel.name}: unexpected ROCm runtime libraries bundled in wheel: "
                              f"{forbidden_members}"
                          )
                      zf.extractall(tmpdir)

                  libproteus = next(pathlib.Path(tmpdir).rglob("libproteus.so"))
                  dynamic = subprocess.check_output(
                      ["readelf", "-d", str(libproteus)],
                      text=True,
                  )
                  forbidden_needed = [
                      line.strip()
                      for line in dynamic.splitlines()
                      if "NEEDED" in line and any(token in line for token in forbidden_needed_libs)
                  ]
                  if forbidden_needed:
                      raise SystemExit(
                          f"{wheel.name}: unexpected direct ROCm runtime dependencies in "
                          f"libproteus.so: {forbidden_needed}"
                      )
          PY

      - name: Upload ROCm backend wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-rocm-linux
          path: wheelhouse/*.whl

  publish-testpypi:
    name: publish TestPyPI
    runs-on: ubuntu-latest
    needs:
      - build-shim-wheel
      - build-shim-sdist
      - build-host-backend-wheels
      - build-cuda-backend-wheels
      - build-rocm-backend-wheels
    if: github.event_name == 'release' && github.event.release.prerelease
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download shim wheel
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: wheels-shim
          path: dist

      - name: Download shim sdist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: sdist-shim
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish-pypi:
    name: publish PyPI
    runs-on: ubuntu-latest
    needs:
      - build-shim-wheel
      - build-shim-sdist
      - build-host-backend-wheels
      - build-cuda-backend-wheels
      - build-rocm-backend-wheels
    if: github.event_name == 'release' && !github.event.release.prerelease
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download shim wheel
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: wheels-shim
          path: dist

      - name: Download shim sdist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: sdist-shim
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          verbose: true

  upload-backend-release-assets:
    name: upload backend release assets
    runs-on: ubuntu-latest
    needs:
      - build-host-backend-wheels
      - build-cuda-backend-wheels
      - build-rocm-backend-wheels
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Linux host backend wheels
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: wheels-host-linux
          path: dist

      - name: Download macOS host backend wheels
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: wheels-host-macos
          path: dist

      - name: Download CUDA backend wheels
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: wheels-cuda-linux
          path: dist

      - name: Download ROCm backend wheels
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: wheels-rocm-linux
          path: dist

      - name: Upload backend wheels to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.whl \
            --clobber \
            --repo "${{ github.repository }}"

  deploy-pages:
    name: deploy docs and wheel index
    needs:
      - upload-backend-release-assets
    if: github.event_name == 'release'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
    with:
      host-backend-package: proteus-python-backend-host-llvm22
      cuda-backend-package: proteus-python-backend-cuda12-llvm22
      rocm-backend-package: proteus-python-backend-rocm72
