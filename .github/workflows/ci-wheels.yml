name: Wheels

permissions:
  contents: read
  packages: read

on:
  pull_request:
    paths:
      - ".github/workflows/ci-wheels.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/wheels/**"
      - "python/**"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-wheels.yml"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "bindings/python/**"
      - "cmake/**"
      - "include/**"
      - "packaging/wheels/**"
      - "python/**"
      - "src/**"

jobs:
  build-wheels:
    name: wheels ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-14 ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Log in to GHCR
        if: runner.os == 'Linux'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: arm64
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/olympus-hpc/proteus-manylinux-llvm:22.1.3
          CIBW_BEFORE_ALL_MACOS: brew install llvm@22
          CIBW_BEFORE_BUILD_MACOS: python -m pip install delocate
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: >-
            LLVM_INSTALL_DIR=/opt/llvm-22.1.3
            PATH=/opt/llvm-22.1.3/bin:$PATH
            CMAKE_ARGS='-DCMAKE_C_COMPILER=/opt/llvm-22.1.3/bin/clang
            -DCMAKE_CXX_COMPILER=/opt/llvm-22.1.3/bin/clang++
            -DCMAKE_ASM_COMPILER=/opt/llvm-22.1.3/bin/clang'
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=14.0
            LLVM_INSTALL_DIR=/opt/homebrew/opt/llvm
            CC=/opt/homebrew/opt/llvm/bin/clang
            CXX=/opt/homebrew/opt/llvm/bin/clang++
            PATH=/opt/homebrew/opt/llvm/bin:$PATH
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel}
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir}
            -v {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ runner.os }}
          path: wheelhouse/*.whl
