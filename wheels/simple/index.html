<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proteus wheel index: simple</title>
    <style>
:root {
      color-scheme: light;
      --bg: #f7f9fc;
      --surface: #ffffff;
      --border: #d8e0ea;
      --text: #1f2937;
      --muted: #5b6878;
      --link: #0b63ce;
      --link-hover: #084b9a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 20px 48px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 32px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.15;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .backlink {
      display: inline-block;
      margin-bottom: 20px;
      font-weight: 600;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li + li {
      margin-top: 12px;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .link-list a {
      display: block;
      padding: 14px 16px;
      background: #f9fbfd;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 1rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px 32px;
      }

      main {
        padding: 22px 18px 24px;
        border-radius: 12px;
      }
    }
    </style>
  </head>
  <body>
    <main>
      <h1>Proteus wheel index: simple</h1>
      <p>Static Python package index for Proteus backend wheels.</p>
      <ul class="link-list">
      </ul>
    </main>
  </body>
</html>
